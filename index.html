<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Cutu Souce ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(135deg,#ffd6ea,#f3d9ff,#d8ecff);
background-size:300% 300%;
animation:bg 12s ease infinite;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

#hearts{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
bottom:-50px;
font-size:22px;
animation:float linear forwards;
opacity:.8;
}

@keyframes float{
0%{
transform:translateY(0) scale(.6);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.3);
opacity:0;
}
}

.card{
width:92%;
max-width:700px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(16px);
border-radius:28px;
padding:40px;
text-align:center;
box-shadow:0 15px 45px rgba(0,0,0,.18);
animation:fade .8s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
font-family:"Dancing Script",cursive;
font-size:56px;
margin-bottom:18px;
}

p{
font-size:18px;
line-height:1.8;
margin-bottom:28px;
}

button{
padding:16px 42px;
font-size:18px;
border:none;
border-radius:50px;
background:white;
color:#ff4d88;
font-weight:700;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,.15);
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

#question,#letter{
display:none;
}
</style>
</head>
<body>

<div id="hearts"></div>

<div class="card" id="welcome">
<h1>A Little Surprise... 🌸</h1>

<p>
Made especially for someone who means a lot to me.
</p>

<button onclick="startWebsite()">Start ❤️</button>
</div>
  <div class="card" id="question">

<h2 id="qTitle">Ready for a little surprise? 🥺</h2>

<p id="qText">
I promise it'll only take a minute.
</p>

<button onclick="nextQuestion()">
Next 💖
</button>

</div>

<div class="card" id="letter">

<h2 style="font-family:'Dancing Script',cursive;font-size:48px;">
Dear My Cutu Souce ❤️
</h2>

<p id="typing"></p>

</div>

<script>

const questions=[
["Ready for a little surprise? 🥺","I promise it'll only take a minute."],
["Do you know someone who's really grateful to have you? 💖","Because I definitely do."],
["Can I borrow your smile for a minute? 😊","I hope this makes you smile."],
["Promise you'll read till the end? ❤️","The best part is still coming."],
["One last question... 🌸","Ready to know what's in my heart?"]
];

let index=0;

function startWebsite(){
document.getElementById("welcome").style.display="none";
document.getElementById("question").style.display="block";
}

function nextQuestion(){

index++;

if(index<questions.length){

document.getElementById("qTitle").innerHTML=questions[index][0];
document.getElementById("qText").innerHTML=questions[index][1];

}else{

document.getElementById("question").style.display="none";
document.getElementById("letter").style.display="block";

typeLetter();

}

}

const message=`
Thank you...

Thank you for always being there for me.

You supported me whenever I needed someone.

You listened to me.

You cared about me.

And I'll always be grateful for that.

Right now you're not okay...

and it hurts because I can't help you the way you've helped me.

I'm really sorry for that.

If I could take away your sadness, I would do it without thinking twice.

Please remember that you're kind, precious, and stronger than you think.

Thank you for every smile...

every laugh...

every memory...

You'll always be...

My Cute Sister.

My Cutu Souce ❤️

Forever grateful,

Your Wholesome Guy,

Yasir
`;

let i=0;

function typeLetter(){

const target=document.getElementById("typing");

const timer=setInterval(()=>{

target.innerHTML+=message.charAt(i);

i++;

if(i>=message.length){

clearInterval(timer);

}

},35);

}
function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=["💖","💕","💗","🌸","✨"][Math.floor(Math.random()*5)];

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(6+Math.random()*5)+"s";

heart.style.fontSize=(20+Math.random()*20)+"px";

document.getElementById("hearts").appendChild(heart);

setTimeout(()=>{
heart.remove();
},11000);

}

setInterval(createHeart,350);

</script>

</body>
</html>
